name: deploy

# Build stable + optional beta channels and publish a combined artifact to GitHub Pages.
# Stable: /RepLog/   Beta: /RepLog/beta/ (when the beta branch exists)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Build stable (Pages base path)
        run: npm run build
        env:
          VITE_BASE: /RepLog/
      - name: Check for beta branch
        id: beta-branch
        run: |
          if git ls-remote --exit-code --heads origin beta >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Beta branch found."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Beta branch not found; deploying stable only."
          fi
      - uses: actions/checkout@v4
        if: steps.beta-branch.outputs.exists == 'true'
        continue-on-error: true
        id: beta-checkout
        with:
          ref: beta
          path: beta-src
      - name: Install beta dependencies
        if: steps.beta-branch.outputs.exists == 'true' && steps.beta-checkout.outcome == 'success'
        continue-on-error: true
        id: beta-install
        working-directory: beta-src
        run: npm ci
      - name: Build beta (Pages base path)
        if: steps.beta-branch.outputs.exists == 'true' && steps.beta-install.outcome == 'success'
        continue-on-error: true
        id: beta-build
        working-directory: beta-src
        run: npm run build
        env:
          VITE_BASE: /RepLog/beta/
      - name: Merge beta build into artifact
        if: steps.beta-branch.outputs.exists == 'true' && steps.beta-build.outcome == 'success'
        continue-on-error: true
        run: |
          mkdir -p dist/beta
          cp -r beta-src/dist/* dist/beta/
      - name: SPA fallback for deep links
        run: |
          cp dist/index.html dist/404.html
          if [ -f dist/beta/index.html ]; then
            cp dist/beta/index.html dist/beta/404.html
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
